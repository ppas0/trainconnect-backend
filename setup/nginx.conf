# TrainConnect Europe – Nginx-Konfiguration
# Datei: /etc/nginx/sites-available/trainconnect
#
# WICHTIG: Ersetze "trainconnect.eu" mit deiner Domain

server {
    # HTTP → HTTPS Redirect
    listen 80;
    listen [::]:80;
    server_name trainconnect.eu www.trainconnect.eu;
    return 301 https://trainconnect.eu$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name trainconnect.eu www.trainconnect.eu;

    # ── SSL (wird von Certbot automatisch gesetzt) ────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/trainconnect.eu/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/trainconnect.eu/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # ── Security Headers ──────────────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ── Gzip ──────────────────────────────────────────────────────────────────
    gzip on;
    gzip_types text/plain application/json application/javascript text/css text/xml;
    gzip_min_length 1024;

    # ── Proxy zu Node.js ──────────────────────────────────────────────────────
    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
    }

    # ── Statische Assets cachen ───────────────────────────────────────────────
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2|woff)$ {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # ── Logs ──────────────────────────────────────────────────────────────────
    access_log /var/log/nginx/trainconnect_access.log;
    error_log  /var/log/nginx/trainconnect_error.log;
}
